# Staging overrides — higher replica counts, DEBUG logging, smaller resources
global:
  domain: staging.ploshtadka.bg

postgresql:
  instances: 1
  storage:
    size: 5Gi

users-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG
    accessTokenExpireMinutes: "60"

venues-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG

bookings-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG

payments-ms:
  replicaCount: 1
  config:
    stripeSuccessUrl: http://staging.ploshtadka.bg/bookings?payment=success
    stripeCancelUrl: http://staging.ploshtadka.bg/bookings?payment=cancelled
