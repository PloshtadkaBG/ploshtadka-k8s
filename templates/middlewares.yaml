# Shared Traefik middlewares — referenced by all service IngressRoutes.
---
# Strips /api prefix before forwarding to backend services.
# Backend services have no knowledge of the /api path prefix.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-api-strip
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  stripPrefix:
    prefixes:
      - /api

---
# ForwardAuth: Traefik calls users-ms /auth/verify for every protected request.
# On success, users-ms returns X-User-* headers which Traefik injects downstream.
# Downstream services never see or validate the JWT themselves.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-jwt-auth
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  forwardAuth:
    address: "http://users-ms.{{ .Release.Namespace }}.svc.cluster.local:{{ index .Values "users-ms" "service" "port" }}/auth/verify"
    trustForwardHeader: true
    authResponseHeaders:
      - X-User-Id
      - X-Username
      - X-User-Scopes

---
# Strips /admin prefix before forwarding to the admin-panel SPA.
# The SPA is compiled with VITE_BASENAME=/admin so it handles routing internally.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-admin-strip
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  stripPrefix:
    prefixes:
      - /admin
