# Production overrides — HA PostgreSQL, HPA enabled, production URLs
global:
  domain: xn--80aalycsf6f.xn--90ae
  entryPoint: websecure
  tls:
    enabled: true
    certResolver: letsencrypt

postgresql:
  instances: 1
  storage:
    size: 50Gi

redis:
  master:
    persistence:
      enabled: true       # persist Redis AOF in prod
      size: 2Gi

users-ms:
  replicaCount: 1
  image:
    pullPolicy: Always
  config:
    logLevel: INFO
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4

