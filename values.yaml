# ── Global values (propagated to every subchart as .Values.global.*) ──────────
global:
  domain: xn--80aalycsf6f.xn--90ae
  dbSecretName: ploshtadka-db-app
  entryPoint: web

  tls:
    enabled: false
    certResolver: letsencrypt

redis:
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  replica:
    replicaCount: 0

postgresql:
  instances: 1
  storage:
    size: 10Gi

  credentialsSecretName: ploshtadka-db-credentials

users-ms:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-users-ms
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
  config:
    logLevel: INFO
    accessTokenExpireMinutes: "120"
    redisUrl: redis://ploshtadka-redis-master:6379/0
    contactEmail: ploshtadka.bg@gmail.com
  secrets:
    # provides SECRET_KEY and GOOGLE_CLIENT_ID.
    name: users-ms-secrets
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

venues-ms:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-venues-ms
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8001
  config:
    logLevel: INFO
    usersMsUrl: http://users-ms:8000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

bookings-ms:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-bookings-ms
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8002
  config:
    logLevel: INFO
    usersMsUrl: http://users-ms:8000
    venuesMsUrl: http://venues-ms:8001
    paymentsMsUrl: http://payments-ms:8003
    redisUrl: redis://ploshtadka-redis-master:6379/0
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

payments-ms:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-payments-ms
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8003
  config:
    bookingsMsUrl: http://bookings-ms:8002
    stripeSuccessUrl: http://xn--80aalycsf6f.xn--90ae/bookings?payment=success
    stripeCancelUrl: http://xn--80aalycsf6f.xn--90ae/bookings?payment=cancelled
    stripeCheckoutExpiresMinutes: "30"
  secrets:
    # provides STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET
    name: payments-ms-secrets
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

notifications-ms:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-notifications-ms
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8004
  config:
    logLevel: INFO
    frontendBaseUrl: http://xn--80aalycsf6f.xn--90ae
  secrets:
    # provides RESEND_API_KEY
    name: notifications-ms-secrets
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

admin-panel:
  replicaCount: 1
  image:
    repository: ghcr.io/ploshtadkabg/ploshtadka-admin-panel
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
