apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  labels:
    {{- include "admin-panel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "admin-panel.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
