apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admin-panel.fullname" . }}
  labels:
    {{- include "admin-panel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "admin-panel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "admin-panel.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: admin-panel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # SPA served by Bun — static files, no external deps
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
