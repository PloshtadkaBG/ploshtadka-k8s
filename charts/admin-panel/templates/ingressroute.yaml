# Admin panel — served under /admin.
# The admin-strip middleware removes the /admin prefix before forwarding,
# because the SPA is compiled with VITE_BASENAME=/admin and handles routing itself.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "admin-panel.fullname" . }}
  labels:
    {{- include "admin-panel.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/admin`)"
      priority: 5
      middlewares:
        - name: {{ .Release.Name }}-admin-strip
      services:
        - name: admin-panel
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
