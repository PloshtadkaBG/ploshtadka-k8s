apiVersion: v1
kind: Service
metadata:
  name: bookings-ms
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "bookings-ms.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
