# bookings-ms routing:
# Priority 10 (public): OPTIONS preflight only — GET /bookings/slots requires auth (blocks scraping)
# Priority 1 (protected): all bookings endpoints require JWT
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "bookings-ms.fullname" . }}-public
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && Method(`OPTIONS`) && PathPrefix(`/api/bookings`)"
      priority: 10
      middlewares:
        - name: {{ include "bookings-ms.apiStripMiddleware" . }}
      services:
        - name: bookings-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "bookings-ms.fullname" . }}-protected
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/api/bookings`)"
      priority: 1
      middlewares:
        - name: {{ include "bookings-ms.jwtAuthMiddleware" . }}
        - name: {{ include "bookings-ms.apiStripMiddleware" . }}
      services:
        - name: bookings-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
