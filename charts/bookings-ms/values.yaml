replicaCount: 1
image:
  repository: ghcr.io/ploshtadkabg/ploshtadka-bookings-ms
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 8002
config:
  logLevel: INFO
  usersMsUrl: http://users-ms:8000
  venuesMsUrl: http://venues-ms:8001
  paymentsMsUrl: http://payments-ms:8003
  redisUrl: redis://ploshtadka-redis-master:6379/0
resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
global:
  domain: ploshtadka.bg
  dbSecretName: ploshtadka-db-app
