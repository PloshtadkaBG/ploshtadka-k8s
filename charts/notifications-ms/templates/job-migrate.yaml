apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "notifications-ms.fullname" . }}-migrate
  labels:
    {{- include "notifications-ms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z ploshtadka-db-rw 5432; do echo "waiting for db..."; sleep 3; done']
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "uv run aerich upgrade || (uv run aerich init-db && uv run aerich upgrade)"]
          envFrom:
            - configMapRef:
                name: {{ include "notifications-ms.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.name }}
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.dbSecretName }}
                  key: uri
