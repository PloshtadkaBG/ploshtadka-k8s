# payments-ms routing — three priority levels:
# Priority 20: Stripe webhook — MUST be public (Stripe cannot provide a JWT).
#              Verified internally via construct_event(raw_body, sig_header, secret).
# Priority 10: OPTIONS preflight — public CORS handling
# Priority 1:  All other /payments endpoints — require JWT
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "payments-ms.fullname" . }}-webhook
  labels:
    {{- include "payments-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && Method(`POST`) && Path(`/api/payments/webhook`)"
      priority: 20
      middlewares:
        - name: {{ include "payments-ms.apiStripMiddleware" . }}
      services:
        - name: payments-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "payments-ms.fullname" . }}-public
  labels:
    {{- include "payments-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && Method(`OPTIONS`) && PathPrefix(`/api/payments`)"
      priority: 10
      middlewares:
        - name: {{ include "payments-ms.apiStripMiddleware" . }}
      services:
        - name: payments-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "payments-ms.fullname" . }}-protected
  labels:
    {{- include "payments-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/api/payments`)"
      priority: 1
      middlewares:
        - name: {{ include "payments-ms.jwtAuthMiddleware" . }}
        - name: {{ include "payments-ms.apiStripMiddleware" . }}
      services:
        - name: payments-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
