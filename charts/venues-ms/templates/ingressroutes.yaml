# venues-ms routing:
# Priority 10 (public): GET and OPTIONS — browsing venues requires no account
# Priority 1 (protected): all writes (create/update/delete venue) require JWT
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "venues-ms.fullname" . }}-public
  labels:
    {{- include "venues-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && (Method(`GET`) || Method(`OPTIONS`)) && PathPrefix(`/api/venues`)"
      priority: 10
      middlewares:
        - name: {{ include "venues-ms.apiStripMiddleware" . }}
      services:
        - name: venues-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "venues-ms.fullname" . }}-protected
  labels:
    {{- include "venues-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/api/venues`)"
      priority: 1
      middlewares:
        - name: {{ include "venues-ms.jwtAuthMiddleware" . }}
        - name: {{ include "venues-ms.apiStripMiddleware" . }}
      services:
        - name: venues-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
