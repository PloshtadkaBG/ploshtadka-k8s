replicaCount: 1
image:
  repository: ghcr.io/ploshtadkabg/ploshtadka-venues-ms
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 8001
config:
  logLevel: INFO
  usersMsUrl: http://users-ms:8000
resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
global:
  domain: ploshtadka.bg
  dbSecretName: ploshtadka-db-app
