# users-ms routing mirrors the Docker Compose label priorities exactly.
#
# Priority 10 (public): /auth/* endpoints + POST /users (registration) + OPTIONS (CORS preflight)
# Priority 1 (protected): all other /users and /scopes endpoints require JWT via forwardAuth
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "users-ms.fullname" . }}-public
  labels:
    {{- include "users-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && (PathPrefix(`/api/auth`) || (Method(`POST`) && PathPrefix(`/api/users`)) || Method(`OPTIONS`))"
      priority: 10
      middlewares:
        - name: {{ include "users-ms.apiStripMiddleware" . }}
      services:
        - name: users-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "users-ms.fullname" . }}-protected
  labels:
    {{- include "users-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && (PathPrefix(`/api/users`) || PathPrefix(`/api/scopes`))"
      priority: 1
      middlewares:
        - name: {{ include "users-ms.jwtAuthMiddleware" . }}
        - name: {{ include "users-ms.apiStripMiddleware" . }}
      services:
        - name: users-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
