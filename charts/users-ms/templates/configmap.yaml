apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "users-ms.fullname" . }}-config
  labels:
    {{- include "users-ms.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.config.accessTokenExpireMinutes | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  CONTACT_EMAIL: {{ .Values.config.contactEmail | quote }}
  CONTACT_RATE_LIMIT: {{ .Values.config.contactRateLimit | quote }}
  CONTACT_RATE_WINDOW: {{ .Values.config.contactRateWindow | quote }}
