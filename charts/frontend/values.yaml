replicaCount: 1
image:
  repository: ghcr.io/ploshtadkabg/ploshtadka-frontend
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 3000
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
global:
  domain: ploshtadka.bg
