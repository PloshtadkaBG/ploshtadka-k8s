# Catch-all route — frontend handles all unmatched paths (lowest priority).
# Backend routes all have higher priority so they are matched first.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/`)"
      priority: 1
      services:
        - name: frontend
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
